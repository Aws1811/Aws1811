<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" width="800" height="100">
  <rect width="800" height="100" fill="#000000"/>
  
  <!-- Hat brim -->
  <ellipse cx="50" cy="45" rx="28" ry="6" fill="#5a3e1b"/>
  <!-- Hat top -->
  <rect x="32" y="18" width="36" height="28" rx="5" fill="#7a5430"/>
  <!-- Hat band -->
  <rect x="30" y="40" width="40" height="5" rx="2" fill="#3a2010"/>
  <!-- Head -->
  <circle cx="50" cy="62" r="14" fill="#f5c5a3"/>
  <!-- Eyes -->
  <circle cx="45" cy="59" r="1.8" fill="#333"/>
  <circle cx="55" cy="59" r="1.8" fill="#333"/>
  <!-- Smile -->
  <path d="M45 67 Q50 72 55 67" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="34" y="76" width="32" height="20" rx="7" fill="#7a5430"/>

  <!-- PABLO text -->
  <text x="110" y="68" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" letter-spacing="8">PABLO</text>
</svg>
